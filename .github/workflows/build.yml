on: [push, pull_request, workflow_dispatch]

name: Build

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:2.5
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Cache west modules
        uses: actions/cache@v2
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (Dactyl ZMK Left)
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=dactyl_zmk_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Dactyl ZMK DTS File
        if: ${{ always() }}
        run: cat -n build/zephyr/nice_nano_v2.dts.pre.tmp

      - name: Dactyl ZMK Left Kconfig file
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename firmware
        run: cp build/zephyr/zmk.uf2 dactyl_zmk_left_nice_nano_v2.uf2

      - name: Archive (Dactyl ZMK Left)
        uses: actions/upload-artifact@v2
        with:
          name: firmware
          path: dactyl_zmk_left_nice_nano_v2.uf2

      - name: West Build (Dactyl ZMK Right)
        run: west build --pristine -s zmk/app -b nice_nano_v2 -- -DSHIELD=dactyl_zmk_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Dactyl ZMK Right Kconfig file
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename firmware
        run: cp build/zephyr/zmk.uf2 dactyl_zmk_right_nice_nano_v2.uf2

      - name: Archive (Dactyl ZMK Right)
        uses: actions/upload-artifact@v2
        with:
          name: firmware
          path: dactyl_zmk_right_nice_nano_v2.uf2
